<!DOCTYPE html>
<html>
<head>
    <title>S3 File Upload</title>
</head>
<body>
    <h1>Upload File to AWS S3</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required><br><br>
        <input type="submit" value="Upload">
    </form>
    <p>{{ message }}</p>
</body>
</html>
